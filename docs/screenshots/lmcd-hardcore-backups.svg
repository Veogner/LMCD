<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="120" y1="80" x2="1320" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0C1220"/>
      <stop offset="0.55" stop-color="#101827"/>
      <stop offset="1" stop-color="#140F18"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" rx="32" fill="url(#bg3)"/>
  <rect x="56" y="56" width="1328" height="788" rx="28" fill="#0B1020" stroke="#1F2937" stroke-width="2"/>
  <text x="96" y="110" fill="#F8FAFC" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Hardcore lock and backup policy</text>
  <text x="96" y="144" fill="#94A3B8" font-size="17" font-family="Segoe UI, Arial, sans-serif">Preset rules, capped backups, and death-triggered wipe logic for hardcore worlds.</text>

  <rect x="96" y="188" width="420" height="270" rx="24" fill="#0F1629" stroke="#243041"/>
  <text x="126" y="230" fill="#E2E8F0" font-size="19" font-family="Segoe UI, Arial, sans-serif" font-weight="700">World rules</text>
  <rect x="126" y="258" width="360" height="66" rx="18" fill="#132233" stroke="#34D399"/>
  <text x="154" y="297" fill="#F8FAFC" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Hardcore Ironman</text>
  <rect x="126" y="344" width="170" height="34" rx="12" fill="#123E34"/>
  <text x="156" y="366" fill="#86EFAC" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="700">RULES LOCKED</text>
  <rect x="316" y="344" width="170" height="34" rx="12" fill="#3A1720"/>
  <text x="346" y="366" fill="#FCA5A5" font-size="13" font-family="Segoe UI, Arial, sans-serif" font-weight="700">CHEAT GUARD ON</text>
  <text x="126" y="412" fill="#94A3B8" font-size="15" font-family="Segoe UI, Arial, sans-serif">Survival only  |  Hard difficulty  |  Force gamemode  |  Commands restricted</text>

  <rect x="96" y="490" width="420" height="292" rx="24" fill="#0F1629" stroke="#243041"/>
  <text x="126" y="532" fill="#E2E8F0" font-size="19" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Auto-backup cadence</text>
  <rect x="126" y="566" width="360" height="22" rx="11" fill="#111B2E"/>
  <rect x="126" y="566" width="270" height="22" rx="11" fill="#0F766E"/>
  <circle cx="216" cy="577" r="18" fill="#0F766E" stroke="#99F6E4" stroke-width="2"/>
  <circle cx="306" cy="577" r="18" fill="#0F766E" stroke="#99F6E4" stroke-width="2"/>
  <circle cx="396" cy="577" r="18" fill="#0F766E" stroke="#99F6E4" stroke-width="2"/>
  <text x="198" y="582" fill="#ECFEFF" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">1</text>
  <text x="288" y="582" fill="#ECFEFF" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">2</text>
  <text x="378" y="582" fill="#ECFEFF" font-size="12" font-family="Segoe UI, Arial, sans-serif" font-weight="700">3</text>
  <text x="126" y="626" fill="#94A3B8" font-size="15" font-family="Segoe UI, Arial, sans-serif">Hardcore creates an auto-backup on every third successful start.</text>
  <text x="126" y="656" fill="#94A3B8" font-size="15" font-family="Segoe UI, Arial, sans-serif">All presets keep only the latest four backups for each server.</text>
  <rect x="126" y="694" width="360" height="54" rx="18" fill="#111B2E"/>
  <text x="154" y="726" fill="#F8FAFC" font-size="17" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Latest backups: auto-start-3, manual, pre-restore, before-mods-install</text>

  <rect x="552" y="188" width="792" height="594" rx="24" fill="#0F1629" stroke="#243041"/>
  <text x="582" y="230" fill="#E2E8F0" font-size="19" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Death handling</text>
  <rect x="582" y="262" width="732" height="136" rx="22" fill="#2A1318" stroke="#7F1D1D"/>
  <text x="612" y="310" fill="#FCA5A5" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Hardcore death detected</text>
  <text x="612" y="346" fill="#FECACA" font-size="17" font-family="Segoe UI, Arial, sans-serif">LMCD watches for hardcore death output, stops the server, then removes the world and its backups.</text>
  <rect x="582" y="430" width="220" height="118" rx="20" fill="#111B2E"/>
  <text x="614" y="468" fill="#94A3B8" font-size="14" font-family="Segoe UI, Arial, sans-serif">Step 1</text>
  <text x="614" y="506" fill="#F8FAFC" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Detect death line</text>
  <rect x="838" y="430" width="220" height="118" rx="20" fill="#111B2E"/>
  <text x="870" y="468" fill="#94A3B8" font-size="14" font-family="Segoe UI, Arial, sans-serif">Step 2</text>
  <text x="870" y="506" fill="#F8FAFC" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Stop the server</text>
  <rect x="1094" y="430" width="220" height="118" rx="20" fill="#111B2E"/>
  <text x="1126" y="468" fill="#94A3B8" font-size="14" font-family="Segoe UI, Arial, sans-serif">Step 3</text>
  <text x="1126" y="506" fill="#F8FAFC" font-size="20" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Wipe world + backups</text>
  <rect x="582" y="584" width="732" height="162" rx="22" fill="#101A2E"/>
  <text x="612" y="628" fill="#E2E8F0" font-size="18" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Non-hardcore policy</text>
  <text x="612" y="666" fill="#94A3B8" font-size="16" font-family="Segoe UI, Arial, sans-serif">Survival, Adventure, and other non-hardcore locked presets keep the same 4-backup cap but auto-save every second start.</text>
  <text x="612" y="700" fill="#94A3B8" font-size="16" font-family="Segoe UI, Arial, sans-serif">They do not wipe the world on death.</text>
</svg>
